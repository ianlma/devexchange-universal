<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> DevExchange | Conversor Universal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="card p-10 w-full max-w-sm">
        <div class="text-center mb-10">
            <h1 class="text-2xl font-black text-slate-800 tracking-tight">DevExchange</h1>
            <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mt-2">Global Currency System</p>
        </div>

        <div class="space-y-6">
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-2">Você envia</label>
                <div class="flex gap-2">
                    <select id="fromCurrency" class="w-1/3 bg-slate-100 border-2 border-transparent rounded-2xl p-3 text-xs font-bold text-slate-700 outline-none focus:border-blue-500 transition cursor-pointer appearance-none">
                        <option value="1" data-symbol="$">USD</option>
                        <option value="5.00" data-symbol="R$">BRL</option>
                        <option value="0.92" data-symbol="€">EUR</option>
                        <option value="0.78" data-symbol="£">GBP</option>
                    </select>
                    <div class="relative flex-1">
                        <span id="fromSymbol" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold">$</span>
                        <input type="number" id="amountInput" placeholder="0.00" 
                            class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 pl-10 text-lg font-bold text-slate-700 focus:border-blue-500 outline-none transition">
                    </div>
                </div>
            </div>

            <div class="flex justify-center py-1">
                <div class="bg-blue-600 text-white p-2 rounded-full shadow-lg shadow-blue-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M7 16V4m0 0L3 8m4-4l4 4m9 4v12m0 0l-4-4m4 4l4-4" />
                    </svg>
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-2">Você recebe</label>
                <div class="flex gap-2">
                    <select id="toCurrency" class="w-1/3 bg-slate-100 border-2 border-transparent rounded-2xl p-3 text-xs font-bold text-slate-700 outline-none focus:border-blue-500 transition cursor-pointer appearance-none">
                        <option value="5.00" data-symbol="R$">BRL</option>
                        <option value="1" data-symbol="$">USD</option>
                        <option value="0.92" data-symbol="€">EUR</option>
                        <option value="0.78" data-symbol="£">GBP</option>
                        <option value="150.0" data-symbol="¥">JPY</option>
                    </select>
                    <div class="flex-1 bg-blue-50 border-2 border-blue-100 rounded-2xl p-4 flex items-center">
                        <span id="toSymbol" class="text-blue-600 font-bold mr-2 text-xl">R$</span>
                        <span id="resultText" class="text-2xl font-black text-blue-600">0,00</span>
                    </div>
                </div>
            </div>
        </div>

        <p id="conversionRate" class="text-center text-[9px] text-slate-300 mt-10 uppercase font-bold tracking-widest italic">Câmbio atualizado via Simulação</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
